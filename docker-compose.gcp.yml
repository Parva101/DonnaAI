services:
  postgres:
    ports: []

  redis:
    ports: []

  backend:
    environment:
      FRONTEND_URL: ${PUBLIC_BASE_URL:-http://localhost}
    ports:
      - "8010:8010"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_WS_URL: ""
    ports:
      - "80:80"
