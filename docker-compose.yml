services:
  postgres:
    image: postgres:16-alpine
    container_name: donnaai-postgres
    environment:
      POSTGRES_USER: donnaai
      POSTGRES_PASSWORD: donnaai
      POSTGRES_DB: donnaai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donnaai -d donnaai"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: donnaai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: donnaai-backend
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://donnaai:donnaai@postgres:5432/donnaai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      FRONTEND_URL: http://localhost:5173
      WHATSAPP_BRIDGE_RUNTIME_DIR: /runtime
    ports:
      - "8010:8010"
    volumes:
      - whatsapp_runtime:/runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8010"

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: donnaai-celery-worker
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://donnaai:donnaai@postgres:5432/donnaai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WHATSAPP_BRIDGE_RUNTIME_DIR: /runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo

    volumes:
      - whatsapp_runtime:/runtime

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: donnaai-celery-beat
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://donnaai:donnaai@postgres:5432/donnaai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WHATSAPP_BRIDGE_RUNTIME_DIR: /runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - whatsapp_runtime:/runtime
    command: celery -A app.core.celery_app beat --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: donnaai-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8010/api/v1
      VITE_WS_URL: http://localhost:8010
    ports:
      - "5173:5173"
    depends_on:
      - backend

  whatsapp-bridge:
    build:
      context: .
      dockerfile: whatsapp_bridge/Dockerfile
    container_name: donnaai-whatsapp-bridge
    profiles: ["whatsapp"]
    environment:
      WHATSAPP_RUNTIME_DIR: /runtime
      WHATSAPP_DEVICE_ID: donna-whatsapp-poc
    volumes:
      - whatsapp_runtime:/runtime
    command: >
      python /app/bridge.py
      --runtime-dir /runtime
      --device-id donna-whatsapp-poc
      listen

volumes:
  postgres_data:
  redis_data:
  whatsapp_runtime:
