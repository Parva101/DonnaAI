services:
  postgres:
    image: postgres:16-alpine
    container_name: donnaai-postgres
    environment:
      POSTGRES_USER: donnaai
      POSTGRES_PASSWORD: donnaai
      POSTGRES_DB: donnaai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donnaai -d donnaai"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: donnaai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
