services:
  postgres:
    image: postgres:16-alpine
    container_name: donnaai-postgres
    environment:
      POSTGRES_USER: donnaai
      POSTGRES_PASSWORD: donnaai
      POSTGRES_DB: donnaai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donnaai -d donnaai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: donnaai-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

